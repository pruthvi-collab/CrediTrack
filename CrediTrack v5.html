<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>CrediTrack</title>
  <script>
    // Apply saved theme immediately to prevent flash
    try {
      var savedTheme = localStorage.getItem("creditrack-theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
    } catch (e) {}
  </script>
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQ3JlZGlUcmFjayIsInNob3J0X25hbWUiOiJDcmVkaVRyYWNrIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwYTBmMWEiLCJ0aGVtZV9jb2xvciI6IiMwYTBmMWEifQ==" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root[data-theme="dark"] {
      --bg: #0a0f1a;
      --card: #111827;
      --card-alt: #1a2234;
      --accent: #22d3a7;
      --accent-dim: #146b55;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --border: #1e293b;
      --success: #10b981;
      --input-bg: #0f172a;
      --row-hover: rgba(34,211,167,0.04);
      --row-active: rgba(34,211,167,0.08);
      --plan-active-bg: rgba(34,211,167,0.08);
      --badge-bg: rgba(16,185,129,0.15);
      --delete-bg: rgba(239,68,68,0.1);
      --delete-border: rgba(239,68,68,0.2);
      --fab-text: #0a0f1a;
    }
    :root[data-theme="light"] {
      --bg: #f5f7fa;
      --card: #ffffff;
      --card-alt: #eef2f7;
      --accent: #0d9488;
      --accent-dim: #065f54;
      --warn: #d97706;
      --danger: #dc2626;
      --text: #0f172a;
      --text-dim: #64748b;
      --border: #d7dde6;
      --success: #059669;
      --input-bg: #ffffff;
      --row-hover: rgba(13,148,136,0.06);
      --row-active: rgba(13,148,136,0.12);
      --plan-active-bg: rgba(13,148,136,0.08);
      --badge-bg: rgba(5,150,105,0.15);
      --delete-bg: rgba(220,38,38,0.08);
      --delete-border: rgba(220,38,38,0.2);
      --fab-text: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      transition: background 0.25s, color 0.25s;
    }
    input { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 0; }

    .container { max-width: 480px; margin: 0 auto; padding: 20px 16px; position: relative; min-height: 100vh; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    .scale-in { animation: scaleIn 0.25s ease forwards; }

    .back-btn {
      background: var(--card-alt); border: none; color: var(--text); font-size: 20px;
      width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .stat-card { background: var(--card-alt); border-radius: 12px; padding: 12px 10px; text-align: center; }
    .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .stat-value { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 16px; cursor: pointer; transition: transform 0.15s;
    }
    .card:active { transform: scale(0.98); }

    .plan-option {
      border-radius: 14px; padding: 18px; cursor: pointer; transition: all 0.25s;
    }
    .plan-option.active { background: var(--plan-active-bg); border: 2px solid var(--accent); }
    .plan-option.inactive { background: var(--card-alt); border: 2px solid var(--border); }

    .week-row {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      cursor: pointer; transition: background 0.2s;
    }
    .week-row:active { background: var(--row-active); }
    .week-row.checked { background: var(--row-hover); }

    .checkbox {
      width: 24px; height: 24px; border-radius: 7px; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
    }
    .checkbox.off { border: 2px solid var(--text-dim); background: transparent; }
    .checkbox.on { border: none; background: var(--accent); }

    .fab {
      width: 100%; max-width: 440px; height: 52px; margin: 24px auto 40px;
      border-radius: 14px; background: var(--accent); color: var(--fab-text); font-size: 16px;
      font-weight: 700; border: none; cursor: pointer;
      box-shadow: 0 4px 24px rgba(34,211,167,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .fab:active { transform: scale(0.92); }

    .primary-btn {
      width: 100%; padding: 16px; font-size: 16px; font-weight: 700;
      background: var(--accent); color: var(--fab-text); border: none; border-radius: 14px;
      cursor: pointer; letter-spacing: 0.5px; font-family: 'DM Sans', sans-serif;
    }
    .primary-btn:disabled { opacity: 0.4; }
    .primary-btn:active:not(:disabled) { transform: scale(0.98); }

    .delete-btn {
      width: 100%; padding: 14px; font-size: 14px; font-weight: 600;
      background: var(--delete-bg); color: var(--danger);
      border: 1px solid var(--delete-border); border-radius: 12px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }

    .input-field {
      width: 100%; padding: 14px 16px; font-size: 16px; background: var(--input-bg);
      border: 2px solid var(--border); border-radius: 12px; color: var(--text);
      outline: none; font-family: 'DM Sans', sans-serif;
    }
    .input-field:focus { border-color: var(--accent); }

    .progress-bar { background: var(--bg); border-radius: 100px; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, var(--accent), var(--accent-dim)); height: 100%; border-radius: 100px; transition: width 0.4s ease; }

    .badge-complete {
      font-size: 12px; background: var(--badge-bg); color: var(--success);
      padding: 3px 10px; border-radius: 20px; font-weight: 600;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    // ===== DATA & STATE =====
    // principal = amount lent, total = amount collected from weekly payments, profit = total - principal
    const PLANS = {
      10000: { principal: 130000, weekly: 10000, weeks: 15, total: 150000, profit: 20000, weeklyAmounts: null },
      5000:  { principal: 65000,  weekly: 5000,  weeks: 15, total: 75000,  profit: 10000, weeklyAmounts: null },
      4000:  { principal: 34000,  weekly: 4000,  weeks: 10, total: 40000,  profit: 6000,  weeklyAmounts: null },
      3500:  { principal: 42500,  weekly: 3500,  weeks: 14, total: 50000,  profit: 7500,  weeklyAmounts: [3500,3500,3500,3500,3500,3500,3500,3500,3500,3500,3500,3500,3500,4500] },
    };

    // Get amount for a specific week (handles custom last-week amounts)
    function getWeekAmount(plan, weekIdx) {
      const p = PLANS[plan];
      if (p.weeklyAmounts) return p.weeklyAmounts[weekIdx] || p.weekly;
      return p.weekly;
    }

    // Get the plan object for a borrower — either a standard PLANS entry or their custom plan
    function getPlan(b) {
      if (b.customPlan) return b.customPlan;
      return PLANS[b.plan];
    }

    // Get amount for a specific week of a borrower (uses custom plan if set)
    function getBorrowerWeekAmount(b, weekIdx) {
      const p = getPlan(b);
      if (p.weeklyAmounts) return p.weeklyAmounts[weekIdx] || p.weekly;
      return p.weekly;
    }

    // Get total received for a borrower based on which weeks are checked
    function calcReceived(b) {
      return b.weeks.reduce((sum, w, i) => sum + (isWeekPaid(w) ? getBorrowerWeekAmount(b, i) : 0), 0);
    }

    let borrowers = [];
    let currentView = "home";
    let selectedId = null;
    let newPlan = 5000;
    let confirmDeleteId = null;
    let showProfitBreakdown = false;
    let editingNameId = null;
    let sortBy = "newest"; // newest, oldest, name, balance
    let filterBy = "all";  // all, active, completed
    let searchQuery = "";
    let appLocked = false;
    let pinInput = "";
    let pinStage = "enter"; // enter, set-new, confirm-new
    let pinTempNew = "";
    let pinError = "";
    let theme = "dark"; // dark, light
    let customPrincipal = "";
    let customWeekly = "";
    let customWeeks = "";

    // ===== STORAGE =====
    function loadData() {
      try {
        const raw = localStorage.getItem("weekly-payments-logbook");
        if (raw) borrowers = JSON.parse(raw);
      } catch (e) {}
      try {
        theme = localStorage.getItem("creditrack-theme") || "dark";
        applyTheme();
      } catch (e) {}
      try {
        if (localStorage.getItem("creditrack-pin")) {
          appLocked = true;
          pinStage = "enter";
        }
      } catch (e) {}
    }
    function saveData() {
      try {
        localStorage.setItem("weekly-payments-logbook", JSON.stringify(borrowers));
      } catch (e) {}
    }

    // ===== THEME =====
    function applyTheme() {
      document.documentElement.setAttribute("data-theme", theme);
    }
    function toggleTheme() {
      theme = theme === "dark" ? "light" : "dark";
      try { localStorage.setItem("creditrack-theme", theme); } catch (e) {}
      applyTheme();
      render();
    }

    // ===== PIN =====
    function hasPIN() {
      try { return !!localStorage.getItem("creditrack-pin"); } catch (e) { return false; }
    }
    function getPIN() {
      try { return localStorage.getItem("creditrack-pin") || ""; } catch (e) { return ""; }
    }
    function setPIN(pin) {
      try { localStorage.setItem("creditrack-pin", pin); } catch (e) {}
    }
    function removePIN() {
      try { localStorage.removeItem("creditrack-pin"); } catch (e) {}
    }
    function pinDigit(d) {
      if (pinInput.length >= 4) return;
      pinInput += d;
      pinError = "";

      if (pinInput.length === 4) {
        if (pinStage === "enter") {
          // Unlock mode
          if (pinInput === getPIN()) {
            appLocked = false;
            pinInput = "";
            render();
          } else {
            pinError = "Wrong PIN, try again";
            pinInput = "";
            render();
          }
          return;
        }
        if (pinStage === "set-new") {
          pinTempNew = pinInput;
          pinInput = "";
          pinStage = "confirm-new";
          render();
          return;
        }
        if (pinStage === "confirm-new") {
          if (pinInput === pinTempNew) {
            setPIN(pinInput);
            pinInput = "";
            pinTempNew = "";
            pinStage = "enter";
            currentView = "menu";
            alert("PIN set successfully!");
            render();
          } else {
            pinError = "PINs don't match, start over";
            pinInput = "";
            pinTempNew = "";
            pinStage = "set-new";
            render();
          }
          return;
        }
      }
      render();
    }
    function pinBackspace() {
      pinInput = pinInput.slice(0, -1);
      pinError = "";
      render();
    }
    function startSetPIN() {
      currentView = "pin-setup";
      pinInput = "";
      pinTempNew = "";
      pinStage = "set-new";
      pinError = "";
      render();
    }
    function confirmRemovePIN() {
      if (confirm("Remove PIN lock? The app will no longer be protected.")) {
        removePIN();
        alert("PIN removed.");
        render();
      }
    }

    // ===== HELPERS =====
    function fmt(n) { return "₹" + Number(n).toLocaleString("en-IN"); }
    function fmtDate(iso) {
      if (!iso) return "";
      return new Date(iso).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
    }
    function isWeekPaid(w) { return typeof w === "boolean" ? w : w?.paid; }
    function getWeekDate(w) { return typeof w === "boolean" ? null : w?.date; }
    function getSelected() { return borrowers.find(b => b.id === selectedId); }

    // ===== ACTIONS =====
    function addBorrower() {
      const input = document.getElementById("nameInput");
      const name = input?.value?.trim();
      if (!name) return;

      let planKey = newPlan;
      let customPlan = null;
      let weeksCount;

      if (newPlan === "custom") {
        // Read current values from DOM
        const pEl = document.getElementById("customPrincipalInput");
        const wEl = document.getElementById("customWeeklyInput");
        const nEl = document.getElementById("customWeeksInput");
        const principal = Number(pEl?.value);
        const weekly = Number(wEl?.value);
        const weeks = Number(nEl?.value);
        if (!principal || principal <= 0) { alert("Enter a valid principal amount"); return; }
        if (!weekly || weekly <= 0) { alert("Enter a valid weekly amount"); return; }
        if (!weeks || weeks <= 0 || weeks > 52) { alert("Enter a valid number of weeks (1-52)"); return; }
        const total = weekly * weeks;
        customPlan = {
          principal,
          weekly,
          weeks,
          total,
          profit: total - principal,
          weeklyAmounts: null,
          isCustom: true,
        };
        planKey = "custom";
        weeksCount = weeks;
      } else {
        weeksCount = PLANS[newPlan].weeks;
      }

      const newBorrower = {
        id: Date.now().toString(),
        name,
        plan: planKey,
        weeks: Array(weeksCount).fill(null).map(() => ({ paid: false, date: null })),
        createdAt: new Date().toISOString(),
      };
      if (customPlan) newBorrower.customPlan = customPlan;

      borrowers.push(newBorrower);
      saveData();
      newPlan = 5000;
      customPrincipal = "";
      customWeekly = "";
      customWeeks = "";
      currentView = "home";
      render();
    }

    function toggleWeek(borrowerId, weekIdx) {
      const b = borrowers.find(x => x.id === borrowerId);
      if (!b) return;
      const current = b.weeks[weekIdx];
      const isPaid = isWeekPaid(current);
      b.weeks[weekIdx] = isPaid ? { paid: false, date: null } : { paid: true, date: new Date().toISOString() };
      saveData();
      render();
    }

    function quickTick(borrowerId, event) {
      if (event) event.stopPropagation();
      const b = borrowers.find(x => x.id === borrowerId);
      if (!b) return;
      // Find first unpaid week
      const idx = b.weeks.findIndex(w => !isWeekPaid(w));
      if (idx === -1) return; // already complete
      b.weeks[idx] = { paid: true, date: new Date().toISOString() };
      saveData();
      render();
    }

    async function exportData() {
      const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        borrowers: borrowers,
      };
      const json = JSON.stringify(data, null, 2);
      const today = new Date().toISOString().slice(0, 10);
      const filename = `creditrack-backup-${today}.txt`;
      const blob = new Blob([json], { type: "text/plain" });
      const file = new File([blob], filename, { type: "text/plain" });

      // Try Web Share API with file (mobile: opens share sheet for Drive, Gmail, WhatsApp, etc.)
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: "CrediTrack Backup",
            text: `CrediTrack backup (${borrowers.length} borrowers)`,
          });
          return;
        } catch (err) {
          if (err.name === "AbortError") return;
        }
      }

      // Try sharing as text only (works on more Android browsers)
      if (navigator.share) {
        try {
          await navigator.share({
            title: "CrediTrack Backup",
            text: json,
          });
          return;
        } catch (err) {
          if (err.name === "AbortError") return;
        }
      }

      // Fallback: regular download
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function triggerImport() {
      document.getElementById("importFileInput").click();
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          const imported = data.borrowers || data; // accept raw array too
          if (!Array.isArray(imported)) throw new Error("Invalid format");
          if (!confirm(`Import ${imported.length} borrower(s)? This will REPLACE your current data.`)) return;
          borrowers = imported;
          saveData();
          render();
          alert("Import successful!");
        } catch (err) {
          alert("Import failed: " + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = ""; // reset so same file can be re-selected
    }

    function deleteBorrower(id) {
      borrowers = borrowers.filter(b => b.id !== id);
      saveData();
      confirmDeleteId = null;
      if (selectedId === id) { selectedId = null; currentView = "home"; }
      render();
    }

    function goDetail(id) { selectedId = id; currentView = "detail"; confirmDeleteId = null; showProfitBreakdown = false; render(); }
    function goHome() { selectedId = null; currentView = "home"; confirmDeleteId = null; showProfitBreakdown = false; render(); }
    function goAdd() { currentView = "add"; newPlan = 5000; customPrincipal = ""; customWeekly = ""; customWeeks = ""; showProfitBreakdown = false; render(); setTimeout(() => document.getElementById("nameInput")?.focus(), 100); }
    function goMenu() { currentView = "menu"; render(); }

    function selectPlan(p) {
      newPlan = p === "custom" ? "custom" : Number(p);
      render();
      setTimeout(() => { const el = document.getElementById("nameInput"); if (el) el.focus(); }, 50);
    }
    function updateCustomField(field, value) {
      if (field === "principal") customPrincipal = value;
      else if (field === "weekly") customWeekly = value;
      else if (field === "weeks") customWeeks = value;
      // Don't re-render (keeps input focus)
    }
    function goSummary() { currentView = "summary"; render(); }
    function goWeekly() { currentView = "weekly"; render(); }
    function goArchive() { currentView = "archive"; render(); }
    function goProfit() { currentView = "profit"; render(); }
    function toggleProfit() { showProfitBreakdown = !showProfitBreakdown; render(); }

    function askDelete(id) { confirmDeleteId = id; render(); }
    function cancelDelete() { confirmDeleteId = null; render(); }

    function updateCreditedDate(id, dateStr) {
      const b = borrowers.find(x => x.id === id);
      if (!b || !dateStr) return;
      b.createdAt = new Date(dateStr + 'T00:00:00').toISOString();
      saveData();
      render();
    }

    function startEditName(id) { editingNameId = id; render(); setTimeout(() => { const el = document.getElementById("editNameInput"); if (el) { el.focus(); el.select(); } }, 50); }
    function cancelEditName() { editingNameId = null; render(); }
    function saveBorrowerName(id) {
      const input = document.getElementById("editNameInput");
      const name = input?.value?.trim();
      if (!name) return;
      const b = borrowers.find(x => x.id === id);
      if (!b) return;
      b.name = name;
      editingNameId = null;
      saveData();
      render();
    }

    function updateWeekDate(borrowerId, weekIdx, dateStr) {
      const b = borrowers.find(x => x.id === borrowerId);
      if (!b || !dateStr) return;
      const current = b.weeks[weekIdx];
      // Only update if currently paid
      if (!isWeekPaid(current)) return;
      b.weeks[weekIdx] = { paid: true, date: new Date(dateStr + 'T00:00:00').toISOString() };
      saveData();
      render();
    }

    function setSort(s) { sortBy = s; render(); }
    function setFilter(f) { filterBy = f; render(); }
    function setSearch(q) {
      searchQuery = q;
      // Update only the list, not the input, to preserve focus
      const listEl = document.getElementById("borrowerList");
      if (listEl) listEl.innerHTML = renderBorrowerList();
    }

    function getFilteredBorrowers() {
      let list = borrowers.slice();

      // By default, hide completed borrowers from home (they live in the archive)
      if (filterBy === "all") {
        list = list.filter(b => !b.weeks.every(isWeekPaid));
      } else if (filterBy === "active") {
        list = list.filter(b => !b.weeks.every(isWeekPaid));
      }
      // filterBy === "completed" keeps everyone; used in archive view

      // Search
      if (searchQuery.trim()) {
        const q = searchQuery.trim().toLowerCase();
        list = list.filter(b => b.name.toLowerCase().includes(q));
      }

      // Sort
      if (sortBy === "newest") {
        list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      } else if (sortBy === "oldest") {
        list.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      } else if (sortBy === "name") {
        list.sort((a, b) => a.name.localeCompare(b.name));
      } else if (sortBy === "balance") {
        list.sort((a, b) => {
          const balA = getPlan(a).total - calcReceived(a);
          const balB = getPlan(b).total - calcReceived(b);
          return balB - balA; // highest balance first
        });
      }

      return list;
    }

    function getCompletedBorrowers() {
      return borrowers.filter(b => b.weeks.every(isWeekPaid))
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    }

    function getMonthlySummary() {
      const now = new Date();
      const month = now.getMonth();
      const year = now.getFullYear();
      let received = 0;
      let expected = 0;
      const paidBorrowers = [];

      borrowers.forEach(b => {
        const plan = getPlan(b);
        // Received this month: sum of amounts for weeks paid in this month
        b.weeks.forEach((w, i) => {
          if (isWeekPaid(w)) {
            const d = new Date(getWeekDate(w));
            if (d.getMonth() === month && d.getFullYear() === year) {
              const amt = getBorrowerWeekAmount(b, i);
              received += amt;
              const existing = paidBorrowers.find(x => x.id === b.id);
              if (existing) {
                existing.amount += amt;
                existing.weeks += 1;
              } else {
                paidBorrowers.push({ id: b.id, name: b.name, amount: amt, weeks: 1 });
              }
            }
          }
        });

        // Expected this month: calculate how many weeks should fall in this month
        // based on credited date + weekly schedule (one payment per week)
        const credited = new Date(b.createdAt);
        for (let i = 0; i < plan.weeks; i++) {
          const dueDate = new Date(credited);
          dueDate.setDate(dueDate.getDate() + (i + 1) * 7);
          if (dueDate.getMonth() === month && dueDate.getFullYear() === year) {
            expected += getBorrowerWeekAmount(b, i);
          }
        }
      });

      return { received, expected, paidBorrowers, monthName: now.toLocaleDateString("en-IN", { month: "long", year: "numeric" }) };
    }

    function getWeeklySummary() {
      // Week is Sunday-Saturday
      const now = new Date();
      const dayOfWeek = now.getDay(); // 0 = Sunday
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - dayOfWeek);
      weekStart.setHours(0, 0, 0, 0);
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekStart.getDate() + 7);

      let received = 0;
      let expected = 0;
      const paidThisWeek = [];
      const expectedThisWeek = [];

      borrowers.forEach(b => {
        const plan = getPlan(b);
        // Received this week
        b.weeks.forEach((w, i) => {
          if (isWeekPaid(w)) {
            const d = new Date(getWeekDate(w));
            if (d >= weekStart && d < weekEnd) {
              const amt = getBorrowerWeekAmount(b, i);
              received += amt;
              paidThisWeek.push({ name: b.name, weekNum: i + 1, amount: amt, date: d });
            }
          }
        });

        // Expected this week (based on schedule)
        const credited = new Date(b.createdAt);
        for (let i = 0; i < plan.weeks; i++) {
          const dueDate = new Date(credited);
          dueDate.setDate(dueDate.getDate() + (i + 1) * 7);
          if (dueDate >= weekStart && dueDate < weekEnd) {
            const amt = getBorrowerWeekAmount(b, i);
            expected += amt;
            const isPaid = isWeekPaid(b.weeks[i]);
            expectedThisWeek.push({ id: b.id, name: b.name, weekNum: i + 1, amount: amt, dueDate, isPaid });
          }
        }
      });

      const weekLabel = `${weekStart.toLocaleDateString("en-IN", { day: "2-digit", month: "short" })} – ${new Date(weekEnd - 1).toLocaleDateString("en-IN", { day: "2-digit", month: "short" })}`;

      return { received, expected, paidThisWeek, expectedThisWeek, weekLabel };
    }

        </div>`;
      }
      let html = `<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">`;
      filtered.forEach(b => {
        const plan = getPlan(b);
        const paid = b.weeks.filter(isWeekPaid).length;
        const received = calcReceived(b);
        const balance = plan.total - received;
        const progress = (paid / plan.weeks) * 100;
        const isComplete = paid === plan.weeks;

        html += `
          <div class="card" onclick="goDetail('${b.id}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
              <div>
                <div style="font-size:16px;font-weight:600">${b.name}</div>
                <div style="font-size:12px;color:var(--text-dim);margin-top:2px">${fmt(plan.weekly)}/week · ${paid}/${plan.weeks} weeks</div>
                <div style="font-size:11px;color:var(--text-dim);margin-top:2px">Credited on ${fmtDate(b.createdAt)}</div>
              </div>
              <div style="text-align:right">
                ${isComplete
                  ? `<span class="badge-complete">COMPLETE</span>`
                  : `<span class="mono" style="font-size:15px;font-weight:700;color:var(--warn)">${fmt(balance)}</span>`
                }
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="flex:1" class="progress-bar" style="height:6px"><div style="height:6px"><div class="progress-fill" style="width:${progress}%;${isComplete ? 'background:var(--success)' : ''}"></div></div></div>
              <span class="mono" style="font-size:12px;color:var(--success);font-weight:500;min-width:70px;text-align:right">${fmt(received)}</span>
              ${!isComplete
                ? `<button onclick="quickTick('${b.id}',event)" style="background:rgba(34,211,167,0.12);color:var(--accent);border:1px solid rgba(34,211,167,0.3);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap">+ W${paid + 1}</button>`
                : ''}
            </div>
          </div>`;
      });
      html += `</div>`;
      return html;
    }

    function renderHome(app) {
      const totalLent = borrowers.reduce((s, b) => s + getPlan(b).principal, 0);
      const totalReceived = borrowers.reduce((s, b) => s + calcReceived(b), 0);
      const totalPending = borrowers.reduce((s, b) => {
        const plan = getPlan(b);
        return s + (plan.total - calcReceived(b));
      }, 0);

      let html = `
        <div class="fade-in">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
            <h1 style="font-size:26px;font-weight:700;letter-spacing:-0.5px">CrediTrack</h1>
            <button onclick="goMenu()" style="background:var(--card-alt);border:none;color:var(--text);width:42px;height:42px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px">
              <span style="display:block;width:18px;height:2px;background:var(--text);border-radius:2px"></span>
              <span style="display:block;width:18px;height:2px;background:var(--text);border-radius:2px"></span>
              <span style="display:block;width:18px;height:2px;background:var(--text);border-radius:2px"></span>
            </button>
          </div>`;

      if (borrowers.length > 0) {
        html += `
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
            <div class="stat-card"><div class="stat-label">Lent</div><div class="stat-value" style="color:var(--text)">${fmt(totalLent)}</div></div>
            <div class="stat-card"><div class="stat-label">Received</div><div class="stat-value" style="color:var(--success)">${fmt(totalReceived)}</div></div>
            <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="color:var(--warn)">${fmt(totalPending)}</div></div>
          </div>

          <div style="margin-bottom:12px">
            <input id="searchInput" type="text" placeholder="🔍 Search borrowers..." value="${searchQuery.replace(/"/g,'&quot;')}" oninput="setSearch(this.value)" style="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box" />
          </div>

          <div style="display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px">
            ${chip("Newest", "newest", sortBy === "newest", "setSort")}
            ${chip("Oldest", "oldest", sortBy === "oldest", "setSort")}
          </div>`;
      }

      if (borrowers.length === 0) {
        html += `
          <div style="text-align:center;padding:60px 20px">
            <div style="font-size:48px;margin-bottom:16px">📒</div>
            <div style="font-size:16px;color:var(--text-dim);margin-bottom:6px">No borrowers yet</div>
            <div style="font-size:13px;color:var(--text-dim)">Tap + to add your first entry</div>
          </div>`;
      } else {
        html += `<div id="borrowerList">${renderBorrowerList()}</div>`;
      }

      html += `<button class="fab" onclick="goAdd()">+ Add Borrower</button>
        <div style="display:flex;gap:10px;margin-top:12px;margin-bottom:40px">
          <button onclick="exportData()" style="flex:1;background:var(--card-alt);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">⬇ Export Backup</button>
          <button onclick="triggerImport()" style="flex:1;background:var(--card-alt);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">⬆ Import Backup</button>
          <input id="importFileInput" type="file" accept="application/json,.json,text/plain,.txt" onchange="importData(event)" style="display:none" />
        </div>
        </div>`;
      app.innerHTML = html;
    }

    function chip(label, value, active, fnName) {
      return `<button onclick="${fnName}('${value}')" style="background:${active ? 'var(--accent)' : 'var(--card-alt)'};color:${active ? 'var(--fab-text)' : 'var(--text)'};border:none;border-radius:100px;padding:6px 14px;font-size:12px;font-weight:${active ? 700 : 500};cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif">${label}</button>`;
    }

    function renderDetail(app) {
      const b = getSelected();
      if (!b) { goHome(); return; }
      const plan = getPlan(b);
      const paid = b.weeks.filter(isWeekPaid).length;
      const received = calcReceived(b);
      const balance = plan.total - received;
      const progress = (paid / plan.weeks) * 100;
      const isComplete = paid === plan.weeks;

      let html = `
        <div class="fade-in">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
            <button class="back-btn" onclick="goHome()">←</button>
            <div style="flex:1">
              ${editingNameId === b.id
                ? `<div style="display:flex;align-items:center;gap:6px">
                    <input id="editNameInput" type="text" value="${b.name.replace(/"/g,'&quot;')}" class="input-field" style="padding:8px 10px;font-size:18px;font-weight:700" onkeydown="if(event.key==='Enter')saveBorrowerName('${b.id}');if(event.key==='Escape')cancelEditName()" />
                    <button onclick="saveBorrowerName('${b.id}')" style="background:var(--accent);color:var(--fab-text);border:none;border-radius:8px;width:36px;height:36px;font-size:16px;font-weight:700;cursor:pointer">✓</button>
                    <button onclick="cancelEditName()" style="background:var(--card-alt);color:var(--text-dim);border:none;border-radius:8px;width:36px;height:36px;font-size:16px;cursor:pointer">✕</button>
                  </div>`
                : `<h2 style="font-size:22px;font-weight:700;display:inline-flex;align-items:center;gap:8px;cursor:pointer" onclick="startEditName('${b.id}')">${b.name} <span style="font-size:12px;color:var(--accent)">✎</span></h2>`
              }
              <div style="font-size:13px;color:var(--text-dim);margin-top:2px">${fmt(plan.weekly)}/week · ${fmt(plan.principal)} loan</div>
              <div style="font-size:11px;color:var(--text-dim);margin-top:4px;display:flex;align-items:center;gap:8px">
                <span>Credited on</span>
                <input type="date" value="${b.createdAt.slice(0,10)}" onchange="updateCreditedDate('${b.id}',this.value)" style="background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-size:11px;padding:3px 6px;font-family:'DM Sans',sans-serif;outline:none" />
              </div>
            </div>
          </div>

          <div style="background:var(--card-alt);border-radius:12px;padding:16px;margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;margin-bottom:10px">
              <span style="font-size:13px;color:var(--text-dim)">Progress</span>
              <span class="mono" style="font-size:13px;color:var(--accent);font-weight:500">${paid}/${plan.weeks} weeks</span>
            </div>
            <div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${progress}%;height:10px"></div></div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
            <div style="background:var(--card-alt);border-radius:12px;padding:14px">
              <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Received</div>
              <div class="mono" style="font-size:20px;font-weight:700;color:var(--success)">${fmt(received)}</div>
            </div>
            <div style="background:var(--card-alt);border-radius:12px;padding:14px">
              <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Balance</div>
              <div class="mono" style="font-size:20px;font-weight:700;color:${balance > 0 ? 'var(--warn)' : 'var(--success)'}">${fmt(balance)}</div>
            </div>
          </div>

          <div style="background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border)">
              <span style="font-size:14px;font-weight:600">Weekly Payments</span>
            </div>`;

      b.weeks.forEach((weekData, i) => {
        const checked = isWeekPaid(weekData);
        const paidDate = getWeekDate(weekData);
        const weekAmt = getBorrowerWeekAmount(b, i);
        const borderBot = i < b.weeks.length - 1 ? "border-bottom:1px solid var(--border);" : "";
        html += `
            <div class="week-row ${checked ? 'checked' : ''}" style="${borderBot}">
              <div class="checkbox ${checked ? 'on' : 'off'}" onclick="toggleWeek('${b.id}',${i})">${checked ? '<span style="color:var(--fab-text);font-size:14px;font-weight:700">✓</span>' : ''}</div>
              <div style="flex:1" onclick="toggleWeek('${b.id}',${i})">
                <span style="font-size:15px;color:${checked ? 'var(--text)' : 'var(--text-dim)'};font-weight:${checked ? 500 : 400};display:block">Week ${i + 1}</span>
                ${checked && paidDate
                  ? `<div style="font-size:11px;color:var(--text-dim);margin-top:4px;display:flex;align-items:center;gap:6px" onclick="event.stopPropagation()">
                       <span>Paid on</span>
                       <input type="date" value="${paidDate.slice(0,10)}" onchange="updateWeekDate('${b.id}',${i},this.value)" onclick="event.stopPropagation()" style="background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-size:11px;padding:2px 5px;font-family:'DM Sans',sans-serif;outline:none" />
                     </div>`
                  : ''}
              </div>
              <span class="mono" style="font-size:14px;color:${checked ? 'var(--accent)' : 'var(--text-dim)'};font-weight:500" onclick="toggleWeek('${b.id}',${i})">${fmt(weekAmt)}</span>
            </div>`;
      });

      html += `</div>`;

      // Delete section
      html += `<div style="margin-top:24px;margin-bottom:40px">`;
      if (confirmDeleteId === b.id) {
        html += `
          <div style="display:flex;gap:10px">
            <button class="delete-btn" style="flex:1;background:var(--danger);color:#fff;border:none" onclick="deleteBorrower('${b.id}')">Confirm Delete</button>
            <button class="delete-btn" style="flex:1;background:var(--card-alt);color:var(--text-dim);border:1px solid var(--border)" onclick="cancelDelete()">Cancel</button>
          </div>`;
      } else {
        html += `<button class="delete-btn" onclick="askDelete('${b.id}')">Remove Borrower</button>`;
      }
      html += `</div></div>`;

      app.innerHTML = html;
    }

    function renderAdd(app) {
      const planKeys = Object.keys(PLANS);
      let html = `
        <div class="fade-in">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:32px">
            <button class="back-btn" onclick="goHome()">←</button>
            <h2 style="font-size:22px;font-weight:700">New Borrower</h2>
          </div>

          <div style="margin-bottom:24px">
            <label style="display:block;font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Person's Name</label>
            <input id="nameInput" type="text" placeholder="Enter name" class="input-field" />
          </div>

          <div style="margin-bottom:32px">
            <label style="display:block;font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Select Plan</label>
            <div style="display:flex;flex-direction:column;gap:12px">`;

      planKeys.forEach(key => {
        const plan = PLANS[key];
        const isActive = newPlan === Number(key);
        html += `
              <div class="plan-option ${isActive ? 'active' : 'inactive'}" onclick="selectPlan(${key})">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                  <span class="mono" style="font-size:18px;font-weight:700;color:${isActive ? 'var(--accent)' : 'var(--text)'}">
                    ${fmt(plan.weekly)}<span style="font-size:13px;font-weight:400;color:var(--text-dim)">/week</span>
                  </span>
                  <div style="width:22px;height:22px;border-radius:50%;${isActive ? 'background:var(--accent)' : 'border:2px solid var(--text-dim)'};display:flex;align-items:center;justify-content:center">
                    ${isActive ? '<span style="color:var(--fab-text);font-size:12px;font-weight:700">✓</span>' : ''}
                  </div>
                </div>
                <div style="font-size:13px;color:var(--text-dim)">Loan: ${fmt(plan.principal)} · ${plan.weeks} weeks</div>
              </div>`;
      });

      // Custom plan option
      const isCustomActive = newPlan === "custom";
      html += `
              <div class="plan-option ${isCustomActive ? 'active' : 'inactive'}" onclick="${isCustomActive ? '' : `selectPlan('custom')`}">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${isCustomActive ? '12' : '6'}px">
                  <span style="font-size:16px;font-weight:700;color:${isCustomActive ? 'var(--accent)' : 'var(--text)'}">
                    ✨ Custom Plan
                  </span>
                  <div style="width:22px;height:22px;border-radius:50%;${isCustomActive ? 'background:var(--accent)' : 'border:2px solid var(--text-dim)'};display:flex;align-items:center;justify-content:center">
                    ${isCustomActive ? '<span style="color:var(--fab-text);font-size:12px;font-weight:700">✓</span>' : ''}
                  </div>
                </div>
                ${isCustomActive
                  ? `<div style="display:flex;flex-direction:column;gap:10px" onclick="event.stopPropagation()">
                      <div>
                        <label style="display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Principal (amount lent)</label>
                        <input id="customPrincipalInput" type="number" inputmode="numeric" placeholder="e.g., 50000" value="${customPrincipal}" oninput="updateCustomField('principal',this.value)" class="input-field" style="padding:10px 12px;font-size:14px" />
                      </div>
                      <div style="display:flex;gap:10px">
                        <div style="flex:1">
                          <label style="display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Weekly amount</label>
                          <input id="customWeeklyInput" type="number" inputmode="numeric" placeholder="e.g., 5000" value="${customWeekly}" oninput="updateCustomField('weekly',this.value)" class="input-field" style="padding:10px 12px;font-size:14px" />
                        </div>
                        <div style="flex:1">
                          <label style="display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Weeks</label>
                          <input id="customWeeksInput" type="number" inputmode="numeric" placeholder="e.g., 12" value="${customWeeks}" oninput="updateCustomField('weeks',this.value)" class="input-field" style="padding:10px 12px;font-size:14px" />
                        </div>
                      </div>
                    </div>`
                  : `<div style="font-size:13px;color:var(--text-dim)">One-off plan with custom principal, weekly amount, and weeks</div>`
                }
              </div>`;

      html += `
            </div>
          </div>
          <button class="primary-btn" onclick="addBorrower()">Add Borrower</button>
        </div>`;

      app.innerHTML = html;
    }

    // ===== INIT =====
    loadData();
    render();
  </script>
</body>
</html>
